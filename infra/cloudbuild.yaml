steps:
  # Step 1: Install dependencies
  - name: 'node:18'
    entrypoint: npm
    args: ['ci']

  # Step 2: Run unit + integration tests with coverage
  - name: 'node:18'
    entrypoint: npm
    args: ['test', '--', '--coverage', '--forceExit', '--ci']
    env:
      - 'NODE_ENV=test'
      - 'GEMINI_API_KEY=$_GEMINI_API_KEY'

  # Step 3: Security audit (fail on high/critical)
  # - name: 'node:18'
  #   entrypoint: npm
  #   args: ['audit', '--audit-level=high']

  # Step 4: Build and push container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/smartstadium/api:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/smartstadium/api:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/smartstadium/api'

  # Step 5: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'smartstadium'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/smartstadium/api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--concurrency=100'
      - '--set-env-vars=NODE_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest,FIREBASE_WEB_API_KEY=firebase-web-api-key:latest,GOOGLE_MAPS_API_KEY=maps-api-key:latest'

substitutions:
  _GEMINI_API_KEY: ''  # Set in Cloud Build trigger

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: '600s'

# Trigger: push to main branch
# Configure at: console.cloud.google.com/cloud-build/triggers
